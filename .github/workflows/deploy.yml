name: Deploy Blog

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          echo "${{ secrets.SERVER_SSH_KEY }}" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Deploy via SSH
        run: |
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            root@117.72.149.211 \
            'cd /var/www/hexo && git pull origin master && npm install --prefer-offline && npx hexo generate'
